<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Nidhi Joshi — AI & Automation Engineer</title>
  <meta name="description" content="Nidhi Joshi — AI engineer specializing in robotics, automation systems, and production-grade applied AI.">
  <meta name="author" content="Nidhi Joshi">
  <link rel="canonical" href="https://nidhijoshi.dev/">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://nidhijoshi.dev/">
  <meta property="og:title"       content="Nidhi Joshi — AI & Automation Engineer">
  <meta property="og:description" content="I build applied AI systems that automate decisions. I don't ship AI without guardrails.">
  <meta property="og:image"       content="https://nidhijoshi.dev/assets/og-preview.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale"      content="en_US">

  <!-- Twitter / X -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Nidhi Joshi — AI & Automation Engineer">
  <meta name="twitter:description" content="I build applied AI systems that automate decisions.">
  <meta name="twitter:image"       content="https://nidhijoshi.dev/assets/og-preview.png">

  <!-- Preloads -->
  <link rel="preload" href="/assets/pic_op2.png" as="image">

  <!-- Favicons -->
  <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon"             type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180"                href="/apple-touch-icon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Crete+Round:ital@0;1&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>

  <!-- ─── Three.js canvas mount ─────────────────────────────────────────── -->
  <div id="app"></div>

  <!-- ─── Site nav ──────────────────────────────────────────────────────── -->
  <header class="site-nav" id="siteNav">
    <nav class="landing-nav" aria-label="Primary">
      <a class="landing-nav__item" id="navHome"    href="#">Home</a>
      <a class="landing-nav__item" id="navWork"    href="#">Work</a>
      <a class="landing-nav__item" id="navBlog"    href="#">Blog</a>
      <a class="landing-nav__item" id="navContact" href="#">Contact</a>
      <a class="landing-nav__item" id="navAbout"   href="#">About</a>
    </nav>
    <button class="theme-toggle" id="themeToggle" aria-label="Switch to dark mode">
      <svg class="theme-toggle__icon theme-toggle__icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1"  x2="12" y2="3"/>  <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1"  y1="12" x2="3"  y2="12"/>  <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="theme-toggle__icon theme-toggle__icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <!-- ─── Index bar ─────────────────────────────────────────────────────── -->
  <div class="index-bar-wrapper" id="indexBarWorkWrapper">
    <div class="index-bar" id="indexBarWork"><!-- populated by JS --></div>
  </div>

  <!-- ─── Scroll progress ───────────────────────────────────────────────── -->
  <div class="scroll-indicator">
    <div class="scroll-bar"></div>
  </div>

  <!-- ─── Landing page — loaded from src/overlays/landing.html ─────────── -->
  <div id="landingMount"></div>

  <!-- ─── Roll contact links — transparent clickable layer over canvas ─── -->
  <div id="rollLinks" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;">
    <a id="rollLinkEmail"    href="mailto:joshichi.nidhi@gmail.com"                                    style="position:absolute;pointer-events:none;opacity:0;" aria-label="Email"></a>
    <a id="rollLinkLinkedIn" href="https://www.linkedin.com/in/connect-nidhichijoshi/" target="_blank" rel="noopener noreferrer" style="position:absolute;pointer-events:none;opacity:0;" aria-label="LinkedIn"></a>
    <a id="rollLinkGitHub"   href="https://github.com/nidhicj"   target="_blank"                      rel="noopener noreferrer" style="position:absolute;pointer-events:none;opacity:0;" aria-label="GitHub"></a>
    <!-- Highlight ring — CSS-driven, moves instantly to hovered card -->
    <div id="rollLinkHighlight" style="
      position:absolute;
      border-radius:10px;
      border:2px solid var(--burgundy,#1f1f1f);
      background:transparent;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.15s ease, left 0.12s ease, top 0.12s ease, width 0.12s ease, height 0.12s ease;
      box-shadow:0 0 0 4px rgba(0,0,0,0.04);
    "></div>
  </div>
  <button class="chat-fab" id="chatFab" aria-label="Open chatbot" hidden>Chat</button>

  <section class="chat-panel" id="chatPanel" aria-label="Chatbot" hidden>
    <div class="chat-grip" aria-hidden="true"></div>
    <header class="chat-header">
      <strong>Ask about my work</strong>
      <button class="chat-close" id="chatClose" aria-label="Close chatbot">✕</button>
    </header>
    <div class="chat-log" id="chatLog" role="log" aria-live="polite"></div>
    <form class="chat-form" id="chatForm">
      <input class="chat-input" id="chatInput" type="text" placeholder="Ask about projects, skills, or contact..." autocomplete="off">
      <button class="chat-send" type="submit">Send</button>
    </form>
    <small class="chat-hint">Powered by Claude · /api/chat</small>
  </section>

  <!-- ─── Scripts ───────────────────────────────────────────────────────── -->
  <script type="module" src="./src/main.js"></script>
  <script type="module" src="./src/chat/chat.js"></script>

</body>
</html>
